services:
  vodarr:
    image: ghcr.io/firestaerter3/vodarr:latest
    # To build locally instead: comment out `image:` above and uncomment below
    # build: .
    container_name: vodarr
    restart: unless-stopped
    ports:
      - "7878:7878"   # Newznab indexer API (add to Sonarr/Radarr/Prowlarr as indexer)
      - "8080:8080"   # Fake qBittorrent API (add to Sonarr/Radarr as download client)
      - "3000:3000"   # Web UI
    volumes:
      - ./config:/config                     # Mount your config.yml here
      - /mnt/debrid/vodarr-strm:/data/strm  # Where .strm files will be written
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
